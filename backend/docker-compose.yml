# ============================================================
# NUMÉ AI Marketing Assistant — Docker Compose
# Orchestrates PostgreSQL, Redis and the backend API.
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: nume-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nume}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nume_secret}
      POSTGRES_DB: ${POSTGRES_DB:-nume}
    ports:
      - "5432:5432"
    volumes:
      - nume_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nume} -d ${POSTGRES_DB:-nume}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nume-net

  redis:
    image: redis:7-alpine
    container_name: nume-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - nume_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nume-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nume-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-nume}:${POSTGRES_PASSWORD:-nume_secret}@db:5432/${POSTGRES_DB:-nume}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.database.init_db &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    networks:
      - nume-net

volumes:
  nume_pg_data:
  nume_redis_data:

networks:
  nume-net:
    driver: bridge
